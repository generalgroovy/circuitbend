<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Video Circuitbender</title>
<style>
/* (styles unchanged except small addition) */
:root{--bg:#101016;--panel:#181826;--panel2:#202034;--text:#f4f4fb;--muted:#b6b6ca;--accent:#8cf7ff;--accent2:#ff67d8;--line:#33334c;--radius:18px}
body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text)}
main{display:grid;grid-template-columns:1.3fr .85fr;gap:18px;padding:16px}
.videoWrap{position:relative}
canvas{width:100%}
.side{max-height:100vh;overflow:hidden}
#controls{overflow:auto;max-height:calc(100vh - 120px)}
.control{margin:10px 0}
.rate{font-size:.75rem;color:#aaa}
</style>
</head>
<body>
<main>
<section>
<input type="file" id="file" accept="video/*">
<video id="video" loop muted playsinline style="display:none"></video>
<canvas id="canvas"></canvas>
</section>
<aside class="side">
<div id="controls"></div>
</aside>
</main>
<script>
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const controls=document.getElementById('controls');

const defaults={brightness:0,contrast:0,rgbSplit:0};
let s={...defaults};
let rates={};

function build(){
 controls.innerHTML='';
 for(const k in defaults){
  const div=document.createElement('div');div.className='control';
  div.innerHTML=`
   <label>${k}</label>
   <input type="range" min="-100" max="100" value="0" data-k="${k}">
   <div class="rate">Δ/sec</div>
   <input type="range" min="-50" max="50" value="0" step="0.1" data-rate="${k}">
  `;
  controls.appendChild(div);
 }
}

controls.addEventListener('input',e=>{
 if(e.target.dataset.k){s[e.target.dataset.k]=+e.target.value}
 if(e.target.dataset.rate){rates[e.target.dataset.rate]=+e.target.value}
});

let last=performance.now();
function loop(t){
 requestAnimationFrame(loop);
 const dt=(t-last)/1000; last=t;

 for(const k in rates){
  if(rates[k]){
   s[k]+=rates[k]*dt;
  }
 }

 ctx.drawImage(video,0,0,canvas.width,canvas.height);
}

document.getElementById('file').onchange=e=>{
 const f=e.target.files[0];
 if(!f)return;
 video.src=URL.createObjectURL(f);
 video.onloadedmetadata=()=>{
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  video.play();
  requestAnimationFrame(loop);
 };
};

build();
</script>
</body>
</html>
